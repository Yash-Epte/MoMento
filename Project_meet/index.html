<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Audio Transcriber</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
    }

    .box {
      background: white;
      border: 2px solid #000;
      width: 800px;
      padding: 40px 60px;
    }

    .row {
      display: flex;
      align-items: center;
      margin-bottom: 30px;
      gap: 20px;
    }

    label {
      font-size: 16px;
      min-width: 100px;
    }

    input[type="file"] {
      flex: 1;
      border: 1px solid #000;
      padding: 8px;
      font-size: 14px;
      background: white;
    }

    .output-section {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .output-title {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border: 1px solid #000;
      border-bottom: none;
      padding: 6px 10px;
      font-size: 14px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    textarea {
      width: 100%;
      max-width: 400px;
      height: 260px;
      border: 1px solid #000;
      resize: none;
      padding: 12px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      outline: none;
    }

    button {
      margin-top: 30px;
      padding: 10px 40px;
      background: #000;
      color: white;
      border: none;
      font-size: 15px;
      cursor: pointer;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    button:hover { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="box">

  <!-- Audio File Row -->
  <div class="row">
    <label>Audio File</label>
    <input type="file" id="audioFile" accept="audio/*,video/*"/>
  </div>

  <!-- Textual Output Box -->
  <div class="output-section">
    <div class="output-title">
      <span>▬</span> Textual O/P
    </div>
    <textarea id="output" placeholder="Transcription will appear here..." readonly></textarea>
  </div>

  <button id="btn" onclick="transcribe()">Transcribe</button>

</div>

<script>
  async function transcribe() {
    const file = document.getElementById('audioFile').files[0];
    if (!file) return alert('Please select an audio file.');

    const apiKey = prompt('Enter your ElevenLabs API Key:');
    if (!apiKey) return;

    const btn = document.getElementById('btn');
    btn.disabled = true;
    btn.textContent = 'Transcribing...';
    document.getElementById('output').value = 'Processing...';

    const formData = new FormData();
    formData.append('file', file);
    formData.append('model_id', 'scribe_v2');
    formData.append('timestamps_granularity', 'none');
    formData.append('tag_audio_events', 'false');

    try {
      const resp = await fetch('https://api.elevenlabs.io/v1/speech-to-text', {
        method: 'POST',
        headers: { 'xi-api-key': apiKey },
        body: formData
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail?.message || `Error ${resp.status}`);
      }

      const data = await resp.json();
      document.getElementById('output').value = data.text || 'No text found.';

    } catch (e) {
      document.getElementById('output').value = 'Error: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Transcribe';
    }
  }
</script>
</body>
</html>
